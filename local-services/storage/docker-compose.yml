services:
  klangscribe-postgres:
    image: postgres:16
    container_name: klangscribe-postgres
    network_mode: host
    restart: always
    environment:
      - POSTGRES_USER=klangscribe
      - POSTGRES_PASSWORD=klangscribe
      - POSTGRES_DB=klangscribe
    # ports:
    #   - "5432:5432"
    volumes:
      - klangscribe-postgres-data:/var/lib/postgresql/data
      - ./klangscribe-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
  
  dagster-postgres:
    image: postgres:16
    container_name: dagster-postgres
    network_mode: host
    restart: always
    environment:
      - POSTGRES_USER=dagster
      - POSTGRES_PASSWORD=dagster
      - POSTGRES_DB=dagster
      - PGPORT=5433
    # ports:
    #   - "5433:5432"
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
      - ./dagster-postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
  
  klangscribe-minio:
    image: minio/minio:latest
    container_name: klangscribe-minio
    network_mode: host
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    volumes:
      - klangscribe-minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  klangscribe-postgres-data:
  dagster-postgres-data:
  klangscribe-minio-data: